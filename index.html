<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/e422ee9676.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1 id="header">CALCULATOR</h1>
    <div class="center">
      <div id="Calculator">
        <div class="center"><div id="display"></div></div>
        <div class="center" id="buttons-container">
          <div id="buttons">
            <button id="1" class="numbers">1</button>
            <button id="2" class="numbers">2</button>
            <button id="3" class="numbers">3</button>
            <button id="4" class="numbers">4</button>
            <button id="5" class="numbers">5</button>
            <button id="6" class="numbers">6</button>
            <button id="7" class="numbers">7</button>
            <button id="8" class="numbers">8</button>
            <button id="9" class="numbers">9</button>
            <button id="0" class="numbers">0</button>
            <button id=".">.</button>
            <button id="+" class="operation">+</button>
            <button id="-" class="operation">-</button>
            <button id="*" class="operation">&times</button>
            <button id="/" class="operation">&divide</button>
            <button id="percent" class="top-row">%</button>
            <button id="clear" class="top-row">C</button>
            <button id="equal" class="operation">=</button>
            <button id="delete" class="top-row">
              <i class="fa-solid fa-delete-left"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
